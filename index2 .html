<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Plan Enrollment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f4f6f9;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:#fff;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:100%;max-width:450px;}
h1{text-align:center;margin-bottom:20px;}
.price{text-align:center;font-size:28px;color:#ff3c3c;margin-bottom:25px;}
input{width:100%;padding:12px;margin-bottom:15px;border-radius:8px;border:1px solid #ddd;}
button{width:100%;padding:12px;background:#111;color:#fff;border:none;border-radius:25px;cursor:pointer;font-size:16px;}
a{display:block;text-align:center;margin-top:15px;text-decoration:none;color:#555;}
</style>
</head>
<body>
<div class="container">
<h1>Monthly Plan</h1>
<div class="price">₹1,999 / Month</div>
<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email Address">
<input type="tel" placeholder="Phone Number">
<button>Confirm Enrollment</button>
<a href="index.html">← Back to Home</a>
</div>
</body>
</html>
